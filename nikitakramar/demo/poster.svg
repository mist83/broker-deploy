<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Nikita Context Protocol</title>
  <desc id="desc">Poster image for a source-backed context protocol site.</desc>
  <rect width="1200" height="630" fill="#050707"/>
  <path d="M0 126h1200M0 252h1200M0 378h1200M0 504h1200M200 0v630M400 0v630M600 0v630M800 0v630M1000 0v630" stroke="#7df4ff" stroke-opacity=".08"/>
  <rect x="650" y="88" width="440" height="444" fill="#071011" stroke="#7df4ff" stroke-opacity=".5"/>
  <circle cx="858" cy="310" r="112" fill="#7df4ff" opacity=".08"/>
  <circle cx="858" cy="310" r="42" fill="#f2efe8"/>
  <g fill="none" stroke="#7df4ff" stroke-opacity=".62" stroke-dasharray="8 12">
    <path d="M716 200 C796 200 782 310 858 310 C940 310 960 210 1032 210"/>
    <path d="M710 420 C780 386 786 310 858 310 C940 310 962 396 1032 396"/>
  </g>
  <g fill="#d8b46b">
