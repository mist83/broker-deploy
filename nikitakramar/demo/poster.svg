  <text x="74" y="98" fill="#7df4ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" letter-spacing="0">nikitakramar.mullmania.com / NCP</text>
  <text x="74" y="216" fill="#f2efe8" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="760" letter-spacing="0">Nikita Context</text>
  <text x="74" y="300" fill="#f2efe8" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="760" letter-spacing="0">Protocol</text>
  <text x="78" y="362" fill="#7df4ff" font-family="Inter, system-ui, sans-serif" font-size="29" font-weight="760" letter-spacing="0">A context instrument, not a profile.</text>
  <text x="78" y="430" fill="#f2efe8" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="23" letter-spacing="0">Agents may read. They may not impersonate.</text>
  <text x="78" y="505" fill="#9da6a5" font-family="Inter, system-ui, sans-serif" font-size="25" letter-spacing="0">Observed. Inferred. Asked, not asserted.</text>
