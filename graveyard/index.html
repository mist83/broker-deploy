<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>graveyard</title>
    <meta name="description" content="Archive browser for retired repos.">
    <link rel="icon" href="./memorial.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./graveyard.css">
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js"
        }
      }
    </script>
    <script>
      (function() {
        const isLocal = /^(localhost|127(?:\.\d{1,3}){3})$/.test(window.location.hostname);
        window.__graveyardUiOrigin = isLocal ? 'http://127.0.0.1:8780' : 'https://ui.mullmania.com';
        document.documentElement.dataset.uiTheme = 'spooky';
        document.documentElement.dataset.uiMode = 'dark';

        const script = document.createElement('script');
        script.src = `${window.__graveyardUiOrigin}/ui.js`;
        script.dataset.uiTheme = 'spooky';
        script.dataset.uiMode = 'dark';
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body class="builder-shell graveyard-site-shell">
    <div id="header-container" class="header"></div>
    <div id="tabs-container" class="tabs"></div>
    <div id="content-container"></div>

    <script type="module" src="./js/graveyard-shell.js"></script>
  </body>
</html>
