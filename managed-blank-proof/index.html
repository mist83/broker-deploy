<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Managed Blank Proof</title>
  <link rel="stylesheet" href="https://ui.mullmania.com/active/style.css">
  <style>
    body {
      margin: 0;
      background: #0f335c;
    }

    .blank-site-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #071a2f;
    }

    .blank-site-card {
      width: min(100%, 560px);
      padding: 32px;
      display: grid;
      gap: 14px;
    }

    .blank-site-card h1,
    .blank-site-card p {
      margin: 0;
    }

    .blank-site-card p {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <main class="blank-site-shell">
    <section class="card blank-site-card">
      <span class="badge badge-primary">Mullmania</span>
      <h1>Managed Blank Proof</h1>
      <p>Placeholder page created from the Mullmania launchpad.</p>
    </section>
  </main>
</body>
</html>
