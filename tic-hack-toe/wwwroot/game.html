<!DOCTYPE html>
<html lang="en">
<head>
    <!-- PWA Lockdown -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Hack-Toe</title>
    <style>
        /* PWA Lockdown */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        input, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        
        html, body {
            position: fixed;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            overscroll-behavior: none;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #2a2a3a;
            color: #ffffff;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            overflow: hidden;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ffd700;
        }
        
        .mode {
            font-size: 18px;
            margin-bottom: 20px;
            color: #aaaaaa;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, min(18vh, 160px));
            grid-template-rows: repeat(3, min(18vh, 160px));
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .cell {
            background: #3a3a4a;
            border: 3px solid #4a4a5a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            color: #ffffff;
        }
        .cell:focus-visible,
        .tv-control:focus-visible {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.18);
        }
        
        .cell.x {
            color: #66ff66;
        }
        
        .cell.o {
            color: #ff6666;
        }
        
        .cell.winner {
            background: #ffd700;
            color: #000000;
            animation: winner-pulse 0.9s ease-out infinite alternate;
        }

        @keyframes winner-pulse {
            from {
                box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.6), 0 0 0 0 rgba(255, 215, 0, 0.0) inset;
                transform: scale(1);
            }
            to {
                box-shadow: 0 0 28px 6px rgba(255, 215, 0, 0.85), 0 0 18px 2px rgba(255, 215, 0, 0.5) inset;
                transform: scale(1.06);
            }
        }

        .status {
            font-size: 24px;
            margin-bottom: 8px;
            min-height: 30px;
        }

        .score {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 20px;
            display: flex;
            gap: 18px;
        }

        .score b {
            color: #ffd700;
            font-weight: 600;
        }
        
        .controls {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 16px;
        }

        .tv-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 720px;
        }

        .tv-control {
            padding: 12px 18px;
            border: 3px solid #4a4a5a;
            border-radius: 4px;
            background: #3a3a4a;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        .tv-control.active {
            border-color: #ffd700;
            color: #ffd700;
        }
    </style>
<link rel="icon" href="../favicon.ico">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#ffd700">
</head>
<body>
    <h1>TIC-HACK-TOE</h1>
    <div class="mode" id="mode">Mode: Normal</div>
    <div class="status" id="status" role="status" aria-live="polite">Your turn</div>
    <div class="score" id="score" aria-label="Session score">
        <span>Wins <b id="score-wins">0</b></span>
        <span>Losses <b id="score-losses">0</b></span>
        <span>Draws <b id="score-draws">0</b></span>
    </div>

    <div class="grid" id="grid" role="grid" aria-label="Tic-tac-toe board">
        <button class="cell" type="button" data-index="0" aria-label="Top left, empty"></button>
        <button class="cell" type="button" data-index="1" aria-label="Top middle, empty"></button>
        <button class="cell" type="button" data-index="2" aria-label="Top right, empty"></button>
        <button class="cell" type="button" data-index="3" aria-label="Middle left, empty"></button>
        <button class="cell" type="button" data-index="4" aria-label="Center, empty"></button>
        <button class="cell" type="button" data-index="5" aria-label="Middle right, empty"></button>
        <button class="cell" type="button" data-index="6" aria-label="Bottom left, empty"></button>
        <button class="cell" type="button" data-index="7" aria-label="Bottom middle, empty"></button>
        <button class="cell" type="button" data-index="8" aria-label="Bottom right, empty"></button>
    </div>
    
    <div class="controls">
        <span>TV remote: Arrows move focus. Enter activates. Backspace resets.</span>
    </div>

    <div class="tv-controls">
        <button class="tv-control" id="mode-normal" type="button">Normal mode</button>
        <button class="tv-control" id="mode-bomb" type="button">Bomb mode</button>
        <button class="tv-control" id="mode-laser" type="button">Laser mode</button>
        <button class="tv-control" id="diff-chill" type="button">AI: Chill</button>
        <button class="tv-control" id="diff-sharp" type="button">AI: Sharp</button>
        <button class="tv-control" id="reset-button" type="button">Reset board</button>
        <button class="tv-control" id="palette-button" type="button">Cycle color</button>
    </div>

    <script type="module">
        import {
            EMPTY_BOARD,
            applyMove,
            findWin,
            isDraw,
            chooseAiMove,
        } from './game-logic.js';

        let board = EMPTY_BOARD.slice();
        let currentPlayer = 'X';
        let gameActive = true;
        let mode = 'normal'; // normal, bomb, laser
        let difficulty = 'sharp'; // chill, sharp
        let bgColors = ['#2a2a3a', '#3a2a2a', '#2a3a3a', '#3a2a4a'];
        let colorIndex = 0;

        const SCORE_KEY = 'tic-hack-toe.score.v1';
        const CELL_POS_LABELS = [
            'Top left', 'Top middle', 'Top right',
            'Middle left', 'Center', 'Middle right',
            'Bottom left', 'Bottom middle', 'Bottom right',
        ];

        function loadScore() {
            try {
                const raw = localStorage.getItem(SCORE_KEY);
                if (!raw) return { wins: 0, losses: 0, draws: 0 };
                const parsed = JSON.parse(raw);
                return {
                    wins: Number(parsed.wins) || 0,
                    losses: Number(parsed.losses) || 0,
                    draws: Number(parsed.draws) || 0,
                };
            } catch {
                return { wins: 0, losses: 0, draws: 0 };
            }
        }

        function saveScore(score) {
            try { localStorage.setItem(SCORE_KEY, JSON.stringify(score)); } catch { /* private mode */ }
        }

        let score = loadScore();

        function getTvControls() {
            return Array.from(document.querySelectorAll('.cell, .tv-control'));
        }

        function focusTvControl(element) {
            if (element && typeof element.focus === 'function') {
                element.focus({ preventScroll: true });
            }
        }

        function findNextTvControl(direction) {
            const controls = getTvControls();
            const current = document.activeElement && controls.includes(document.activeElement)
                ? document.activeElement
                : controls[0];

            if (!current) {
                return null;
            }

            const currentRect = current.getBoundingClientRect();
            const currentCenterX = currentRect.left + currentRect.width / 2;
            const currentCenterY = currentRect.top + currentRect.height / 2;

            let best = null;
            let bestScore = Number.POSITIVE_INFINITY;

            controls.forEach((candidate) => {
                if (candidate === current) {
                    return;
                }

                const rect = candidate.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const deltaX = centerX - currentCenterX;
                const deltaY = centerY - currentCenterY;

                if (direction === 'ArrowRight' && deltaX <= 0) return;
                if (direction === 'ArrowLeft' && deltaX >= 0) return;
                if (direction === 'ArrowDown' && deltaY <= 0) return;
                if (direction === 'ArrowUp' && deltaY >= 0) return;

                const primary = direction === 'ArrowLeft' || direction === 'ArrowRight'
                    ? Math.abs(deltaX)
                    : Math.abs(deltaY);
                const secondary = direction === 'ArrowLeft' || direction === 'ArrowRight'
                    ? Math.abs(deltaY)
                    : Math.abs(deltaX);
                const score = primary + (secondary * 4);

                if (score < bestScore) {
                    bestScore = score;
                    best = candidate;
                }
            });

            return best || current;
        }

        function setMode(nextMode) {
            mode = nextMode;
            renderModeLine();
            document.getElementById('mode-normal').classList.toggle('active', mode === 'normal');
            document.getElementById('mode-bomb').classList.toggle('active', mode === 'bomb');
            document.getElementById('mode-laser').classList.toggle('active', mode === 'laser');
        }

        function setDifficulty(nextDifficulty) {
            difficulty = nextDifficulty;
            renderModeLine();
            document.getElementById('diff-chill').classList.toggle('active', difficulty === 'chill');
            document.getElementById('diff-sharp').classList.toggle('active', difficulty === 'sharp');
        }

        function renderModeLine() {
            const modeLabel = mode === 'bomb' ? 'Bomb' : mode === 'laser' ? 'Laser' : 'Normal';
            const diffLabel = difficulty === 'sharp' ? 'Sharp' : 'Chill';
            document.getElementById('mode').textContent = `Mode: ${modeLabel} · AI: ${diffLabel}`;
        }

        function makeMove(index) {
            if (!gameActive || board[index] !== '' || currentPlayer !== 'X') return;

            board = applyMove(board, index, 'X', mode);
            render();

            if (checkWin('X')) {
                endGame('You win!', 'win');
                return;
            }

            if (isDraw(board)) {
                endGame('Draw!', 'draw');
                return;
            }

            currentPlayer = 'O';
            document.getElementById('status').textContent = 'AI thinking...';
            setTimeout(aiMove, 500);
        }

        function aiMove() {
            const move = chooseAiMove(board, 'O', { difficulty, mode });
            if (move < 0) return;

            board = applyMove(board, move, 'O', 'normal');
            currentPlayer = 'X';
            render();

            if (checkWin('O')) {
                endGame('AI wins!', 'loss');
                return;
            }

            if (isDraw(board)) {
                endGame('Draw!', 'draw');
                return;
            }

            document.getElementById('status').textContent = 'Your turn';
        }

        function checkWin(player) {
            const winLine = findWin(board, player);
            if (!winLine) return false;
            winLine.forEach((i) => {
                document.querySelector(`[data-index="${i}"]`).classList.add('winner');
            });
            return true;
        }

        function endGame(message, outcome) {
            gameActive = false;
            document.getElementById('status').textContent = message;
            if (outcome === 'win') score.wins += 1;
            else if (outcome === 'loss') score.losses += 1;
            else if (outcome === 'draw') score.draws += 1;
            if (outcome) {
                saveScore(score);
                renderScore();
            }
        }

        function renderScore() {
            document.getElementById('score-wins').textContent = score.wins;
            document.getElementById('score-losses').textContent = score.losses;
            document.getElementById('score-draws').textContent = score.draws;
        }

        function render() {
            board.forEach((val, i) => {
                const cell = document.querySelector(`[data-index="${i}"]`);
                cell.textContent = val;
                cell.className = `cell ${val.toLowerCase()}`;
                const pos = CELL_POS_LABELS[i];
                const occ = val === 'X' ? 'your mark' : val === 'O' ? 'opponent mark' : 'empty';
                cell.setAttribute('aria-label', `${pos}, ${occ}`);
            });
        }

        function reset() {
            board = EMPTY_BOARD.slice();
            currentPlayer = 'X';
            gameActive = true;
            setMode('normal');
            document.getElementById('status').textContent = 'Your turn';
            render();
        }

        function cycleColor() {
            colorIndex = (colorIndex + 1) % bgColors.length;
            document.body.style.background = bgColors[colorIndex];
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (key === 'ArrowLeft' || key === 'ArrowRight' || key === 'ArrowUp' || key === 'ArrowDown') {
                e.preventDefault();
                focusTvControl(findNextTvControl(key));
                return;
            }

            if (key === 'Enter') {
                const target = document.activeElement;
                if (target instanceof HTMLButtonElement) {
                    e.preventDefault();
                    target.click();
                    return;
                }
            }
            
            if (key === 'Backspace') {
                e.preventDefault();
                reset();
            }
        });

        document.querySelectorAll('.cell').forEach((cell) => {
            cell.addEventListener('click', () => {
                makeMove(Number(cell.dataset.index));
            });
        });

        document.getElementById('mode-normal').addEventListener('click', () => setMode('normal'));
        document.getElementById('mode-bomb').addEventListener('click', () => setMode('bomb'));
        document.getElementById('mode-laser').addEventListener('click', () => setMode('laser'));
        document.getElementById('diff-chill').addEventListener('click', () => setDifficulty('chill'));
        document.getElementById('diff-sharp').addEventListener('click', () => setDifficulty('sharp'));
        document.getElementById('reset-button').addEventListener('click', reset);
        document.getElementById('palette-button').addEventListener('click', cycleColor);

        render();
        renderScore();
        setMode('normal');
        setDifficulty('sharp');
        focusTvControl(document.querySelector('[data-index="0"]'));

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch((err) => {
                console.warn('[tic-hack-toe] service worker registration failed', err);
            });
        }
    </script>
</body>
</html>
