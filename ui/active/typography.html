<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Reference</title>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f3f4f6;
            color: #111827;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(17, 24, 39, 0.08);
        }

        .toolbar label {
            font-size: 14px;
            color: #4b5563;
        }

        .toolbar select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(17, 24, 39, 0.16);
            background: white;
            color: #111827;
        }

        #app {
            min-height: calc(100vh - 73px);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <label for="theme-select">Theme</label>
        <select id="theme-select"></select>
    </div>
    <div id="app"></div>
    <script>
        (function() {
            const themeOptions = ['blackwhite', 'blue', 'cyberblue', 'cyberpink', 'editorial', 'ghoul', 'green', 'indigo', 'mac', 'mockup', 'monochrome', 'ocean', 'orange', 'pastelzom', 'precog', 'pumpkin', 'red', 'sunset', 'terminal', 'violet', 'walmart', 'windows31', 'yellow'];
            const params = new URLSearchParams(window.location.search);
            const theme = themeOptions.includes(params.get('theme')) ? params.get('theme') : 'walmart';
            const select = document.getElementById('theme-select');

            select.innerHTML = themeOptions
                .map((themeId) => `<option value="${themeId}" ${themeId === theme ? 'selected' : ''}>${themeId}</option>`)
                .join('');

            select.addEventListener('change', (event) => {
                const nextUrl = new URL(window.location.href);
                nextUrl.searchParams.set('theme', event.target.value);
                window.location.href = nextUrl.toString();
            });

            const script = document.createElement('script');
            script.src = `/ui.js?theme=${encodeURIComponent(theme)}`;
            script.async = false;
            document.head.appendChild(script);

            script.addEventListener('load', async () => {
                await window.UI.ready();
                document.title = `UI Reference · ${theme}`;
                window.UI.presets.mount('#app', 'reference.typography', { themeId: theme });
            }, { once: true });
        })();
    </script>
</body>
</html>
