<div class="p-lg">
    <h2>Color Variables</h2>
    <p class="mb-lg">Customize all color variables for your theme. Changes update in real-time.</p>
    
    <div class="grid gap-lg mb-xl">
        <!-- Primary Colors -->
        <div class="card">
            <h3 class="mb-md">Primary Colors</h3>
            <div class="grid grid-2 gap-md">
                <div>
                    <label>Primary</label>

                    <input type="text" id="color-primary-text" value="#2563EB" class="text-input">
                </div>
                <div>
                    <label>Secondary</label>
                    <input type="color" id="color-secondary" value="#0F766E" class="color-input">
                    <input type="text" id="color-secondary-text" value="#0F766E" class="text-input">
                </div>
                <div>
                    <label>Primary Hover</label>
                    <input type="color" id="color-primary-hover" value="#1D4ED8" class="color-input">
                    <input type="text" id="color-primary-hover-text" value="#1D4ED8" class="text-input">
                </div>
                <div>
                    <label>Secondary Hover</label>
                    <input type="color" id="color-secondary-hover" value="#115E59" class="color-input">
                    <input type="text" id="color-secondary-hover-text" value="#115E59" class="text-input">
                </div>
            </div>
        </div>

        <!-- Backgrounds -->
        <div class="card">
            <h3 class="mb-md">Backgrounds</h3>
            <div class="grid grid-2 gap-md">
                <div>
                    <label>Primary Background</label>
                    <input type="color" id="bg-primary" value="#ffffff" class="color-input">
                    <input type="text" id="bg-primary-text" value="#ffffff" class="text-input">
                </div>
                <div>
                    <label>Secondary Background</label>
                    <input type="color" id="bg-secondary" value="#f9fafb" class="color-input">
                    <input type="text" id="bg-secondary-text" value="#f9fafb" class="text-input">
                </div>
                <div>
                    <label>Tertiary Background</label>
                    <input type="color" id="bg-tertiary" value="#f3f4f6" class="color-input">
                    <input type="text" id="bg-tertiary-text" value="#f3f4f6" class="text-input">
                </div>
                <div>
                    <label>Card Background</label>
                    <input type="color" id="bg-card" value="#f8f9fa" class="color-input">
                    <input type="text" id="bg-card-text" value="#f8f9fa" class="text-input">
                </div>
                <div>
                    <label>Hover Background</label>
                    <input type="color" id="bg-hover" value="#e5e7eb" class="color-input">
                    <input type="text" id="bg-hover-text" value="#e5e7eb" class="text-input">
                </div>
            </div>
        </div>

        <!-- Text Colors -->
        <div class="card">
            <h3 class="mb-md">Text Colors</h3>
            <div class="grid grid-2 gap-md">
                <div>
                    <label>Primary Text</label>
                    <input type="color" id="text-primary" value="#000000" class="color-input">
                    <input type="text" id="text-primary-text" value="#000000" class="text-input">
                </div>
                <div>
                    <label>Secondary Text</label>
                    <input type="color" id="text-secondary" value="#666666" class="color-input">
                    <input type="text" id="text-secondary-text" value="#666666" class="text-input">
                </div>
                <div>
                    <label>Muted Text</label>
                    <input type="color" id="text-muted" value="#9ca3af" class="color-input">
                    <input type="text" id="text-muted-text" value="#9ca3af" class="text-input">
                </div>
                <div>
                    <label>Dark Text</label>
                    <input type="color" id="text-dark" value="#374151" class="color-input">
                    <input type="text" id="text-dark-text" value="#374151" class="text-input">
                </div>
                <div>
                    <label>Text on Primary</label>
                    <input type="color" id="text-on-primary" value="#ffffff" class="color-input">
                    <input type="text" id="text-on-primary-text" value="#ffffff" class="text-input">
                </div>
            </div>
        </div>

        <!-- Borders -->
        <div class="card">
            <h3 class="mb-md">Borders</h3>
            <div class="grid grid-2 gap-md">
                <div>
                    <label>Border Color</label>
                    <input type="color" id="border-color" value="#dddddd" class="color-input">
                    <input type="text" id="border-color-text" value="#dddddd" class="text-input">
                </div>
                <div>
                    <label>Light Border</label>
                    <input type="color" id="border-light" value="#f3f4f6" class="color-input">
                    <input type="text" id="border-light-text" value="#f3f4f6" class="text-input">
                </div>
                <div>
                    <label>Medium Border</label>
                    <input type="color" id="border-medium" value="#cccccc" class="color-input">
                    <input type="text" id="border-medium-text" value="#cccccc" class="text-input">
                </div>
                <div>
                    <label>Dark Border</label>
                    <input type="color" id="border-dark" value="#444444" class="color-input">
                    <input type="text" id="border-dark-text" value="#444444" class="text-input">
                </div>
            </div>
        </div>

        <!-- Semantic Colors -->
        <div class="card">
            <h3 class="mb-md">Semantic Colors</h3>
            <div class="grid grid-2 gap-md">
                <div>
                    <label>Success</label>
                    <input type="color" id="color-success" value="#4CAF50" class="color-input">
                    <input type="text" id="color-success-text" value="#4CAF50" class="text-input">
                </div>
                <div>
                    <label>Success Action</label>
                    <input type="color" id="color-success-action" value="#28a745" class="color-input">
                    <input type="text" id="color-success-action-text" value="#28a745" class="text-input">
                </div>
                <div>
                    <label>Success Background</label>
                    <input type="color" id="color-success-bg" value="#e8f5e9" class="color-input">
                    <input type="text" id="color-success-bg-text" value="#e8f5e9" class="text-input">
                </div>
                <div>
                    <label>Danger</label>
                    <input type="color" id="color-danger" value="#dc3545" class="color-input">
                    <input type="text" id="color-danger-text" value="#dc3545" class="text-input">
                </div>
                <div>
                    <label>Danger Hover</label>
                    <input type="color" id="color-danger-hover" value="#c82333" class="color-input">
                    <input type="text" id="color-danger-hover-text" value="#c82333" class="text-input">
                </div>
                <div>
                    <label>Danger Background</label>
                    <input type="color" id="color-danger-bg" value="#ffebee" class="color-input">
                    <input type="text" id="color-danger-bg-text" value="#ffebee" class="text-input">
                </div>
                <div>
                    <label>Warning</label>
                    <input type="color" id="color-warning" value="#FF9800" class="color-input">
                    <input type="text" id="color-warning-text" value="#FF9800" class="text-input">
                </div>
                <div>
                    <label>Warning Background</label>
                    <input type="color" id="color-warning-bg" value="#fff3e0" class="color-input">
                    <input type="text" id="color-warning-bg-text" value="#fff3e0" class="text-input">
                </div>
                <div>
                    <label>Info</label>
                    <input type="color" id="color-info" value="#2196F3" class="color-input">
                    <input type="text" id="color-info-text" value="#2196F3" class="text-input">
                </div>
                <div>
                    <label>Info Background</label>
                    <input type="color" id="color-info-bg" value="#e3f2fd" class="color-input">
                    <input type="text" id="color-info-bg-text" value="#e3f2fd" class="text-input">
                </div>
                <div>
                    <label>Error</label>
                    <input type="color" id="color-error" value="#f44336" class="color-input">
                    <input type="text" id="color-error-text" value="#f44336" class="text-input">
                </div>
            </div>
        </div>

        <!-- Disabled States -->
        <div class="card">
            <h3 class="mb-md">Disabled States</h3>
            <div class="grid grid-2 gap-md">
                <div>
                    <label>Button Disabled BG</label>
                    <input type="color" id="button-disabled-bg" value="#e9ecef" class="color-input">
                    <input type="text" id="button-disabled-bg-text" value="#e9ecef" class="text-input">
                </div>
                <div>
                    <label>Button Disabled Text</label>
                    <input type="color" id="button-disabled-text" value="#6c757d" class="color-input">
                    <input type="text" id="button-disabled-text-text" value="#6c757d" class="text-input">
                </div>
                <div>
                    <label>Button Disabled Border</label>
                    <input type="color" id="button-disabled-border" value="#dee2e6" class="color-input">
                    <input type="text" id="button-disabled-border-text" value="#dee2e6" class="text-input">
                </div>
                <div>
                    <label>Input Disabled BG</label>
                    <input type="color" id="input-disabled-bg" value="#e9ecef" class="color-input">
                    <input type="text" id="input-disabled-bg-text" value="#e9ecef" class="text-input">
                </div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="grid grid-4 gap-md mb-lg">
        <button id="copy-theme-btn" class="btn-primary">
            <i class="ti ti-copy"></i> Copy from Theme
        </button>
        <button id="randomize-btn" class="btn-secondary">
            <i class="ti ti-dice"></i> Randomize
        </button>
        <button id="reset-btn" class="btn-cancel">
            <i class="ti ti-refresh"></i> Reset
        </button>
        <button id="get-url-btn" class="btn-primary">
            <i class="ti ti-code"></i> Copy Token Block
        </button>
    </div>

    <!-- Preview Section -->
    <div class="card">
        <h3 class="mb-md">Live Preview</h3>
        <div id="preview-area" style="padding: 20px; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md);">
            <h4 style="color: var(--text-primary);">Preview Heading</h4>
            <p style="color: var(--text-secondary);">This is secondary text that updates in real-time.</p>
            <button style="background: var(--color-primary); color: var(--text-on-primary); padding: 10px 20px; border: none; border-radius: var(--radius-sm); cursor: pointer;">Primary Button</button>
            <button style="background: var(--color-secondary); color: #000; padding: 10px 20px; border: none; border-radius: var(--radius-sm); cursor: pointer; margin-left: 10px;">Secondary Button</button>
        </div>
    </div>
</div>

<style>
.color-input {
    width: 100%;
    height: 40px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-bottom: 4px;
}

.text-input {
    width: 100%;
    padding: 8px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: var(--text-sm);
}

label {
    display: block;
    margin-bottom: 4px;
    font-weight: var(--weight-semibold);
    font-size: var(--text-sm);
}
</style>

<script>
(function() {
    // Sync color inputs with text inputs
    document.querySelectorAll('.color-input').forEach(input => {
        const textInput = document.getElementById(input.id + '-text');
        
        input.addEventListener('input', (e) => {
            textInput.value = e.target.value.toUpperCase();
            updateCSSVariable(input.id, e.target.value);
        });
        
        textInput.addEventListener('input', (e) => {
            if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) {
                input.value = e.target.value;
                updateCSSVariable(input.id, e.target.value);
            }
        });
    });
    
    function updateCSSVariable(id, value) {
        const varName = '--' + id.replace(/-text$/, '');
        document.documentElement.style.setProperty(varName, value);
    }
    
    // Copy from Theme
    document.getElementById('copy-theme-btn').addEventListener('click', () => {
        const themes = ['blackwhite', 'blue', 'cyberblue', 'cyberpink', 'editorial', 'ghoul', 'green', 'indigo', 'mac', 'mockup', 'monochrome', 'ocean', 'orange', 'pastelzom', 'precog', 'pumpkin', 'red', 'sunset', 'terminal', 'violet', 'walmart', 'windows31', 'yellow'];
        const theme = prompt('Enter theme name: ' + themes.join(', '));
        if (theme && themes.includes(theme)) {
            alert('Copy from theme functionality - would load ' + theme + ' colors');
        }
    });
    
    // Randomize
    document.getElementById('randomize-btn').addEventListener('click', () => {
        document.querySelectorAll('.color-input').forEach(input => {
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            input.value = randomColor;
            document.getElementById(input.id + '-text').value = randomColor.toUpperCase();
            updateCSSVariable(input.id, randomColor);
        });
    });
    
    // Reset
    document.getElementById('reset-btn').addEventListener('click', () => {
        if (confirm('Reset all colors to the current default theme values?')) {
            location.reload();
        }
    });
    
    // Copy CSS variable block
    document.getElementById('get-url-btn').addEventListener('click', () => {
        const variables = Array.from(document.querySelectorAll('.color-input'))
            .map((input) => `    --${input.id}: ${input.value.toUpperCase()};`)
            .join('\\n');
        const tokenBlock = `:root {\\n${variables}\\n}`;

        navigator.clipboard.writeText(tokenBlock).then(() => {
            alert('Token block copied to clipboard!\\n\\n' + tokenBlock);
        });
    });
})();
</script>
