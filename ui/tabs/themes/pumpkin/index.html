<div class="theme-preview-pumpkin" style="overflow-y: auto; background: #FFF8F0;  padding: 32px;">
    <style>
        .theme-preview-pumpkin {
            --color-primary: #FF6600;
            --color-secondary: #000000;
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #eeeeee;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #cccccc;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }
        .theme-preview-pumpkin .card { border-radius: 16px; }
        .theme-preview-pumpkin button { border-radius: 16px; }
    </style>
    <div>
        <h2>Pumpkin Theme</h2>
        <p class="mb-lg">Orange and black with rounded corners.</p>
        <div class="grid gap-lg">
            <div class="card">
                <h3 class="mb-md"><i class="ti ti-palette"></i> Color Palette</h3>
                <div class="grid grid-2 gap-md">
                    <div>
                        <div style="overflow-y: auto; background: #FF6600; height: 60px; border-radius: 16px; margin-bottom: var(--space-sm);"></div>
                        <strong>Primary: #FF6600</strong>
                        <p class="text-muted">Orange</p>
                    </div>
                    <div>
                        <div style="overflow-y: auto; background: #000000; height: 60px; border-radius: 16px; margin-bottom: var(--space-sm);"></div>
                        <strong>Secondary: #000000</strong>
                        <p class="text-muted">Black</p>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3 class="mb-md"><i class="ti ti-code"></i> Usage</h3>
                <pre><code>&lt;link rel="stylesheet" href="https://ui.mullmania.com/pumpkin/style.css"&gt;</code></pre>
                <button onclick="navigator.clipboard.writeText('https://ui.mullmania.com/pumpkin/style.css').then(() => alert('URL copied!'))" class="btn-primary mt-md">
                    <i class="ti ti-copy"></i> Copy URL
                </button>
            </div>
            <div class="card">
                <h3 class="mb-md"><i class="ti ti-list"></i> Characteristics</h3>
                <ul style="list-style: none; padding: 0;">
                    <li class="mb-sm"><i class="ti ti-check"></i> Orange primary color</li>
                    <li class="mb-sm"><i class="ti ti-check"></i> Rounded corners (16px)</li>
                    <li class="mb-sm"><i class="ti ti-check"></i> Clean and friendly</li>
                </ul>
            </div>
        </div>
    </div>
</div>
<style>
pre { background: var(--bg-tertiary); padding: var(--space-md); border-radius: var(--radius-sm); overflow-x: auto; border-left: 3px solid var(--color-primary); }
code { font-family: var(--font-mono); font-size: var(--text-sm); }
ul li i { color: var(--color-success); margin-right: var(--space-xs); }
</style>
