<div class="theme-preview-ocean" style="overflow-y: auto; background: #e6f3f9;  padding: 32px;">
    <style>
        .theme-preview-ocean {
            --color-primary: #006994;
            --color-secondary: #00A8CC;
            --bg-primary: #f0f8ff;
            --bg-secondary: #e6f3f9;
            --bg-tertiary: #d4ebf2;
            --text-primary: #003d5c;
            --text-secondary: #006994;
            --text-muted: #7fa8b8;
            --border-color: #00A8CC;
        }
    </style>
    <div>
        <h2>Ocean Theme</h2>
        <p class="mb-lg">Cool blues and teals inspired by the sea.</p>
        <div class="grid gap-lg">
            <div class="card">
                <h3 class="mb-md"><i class="ti ti-palette"></i> Color Palette</h3>
                <div class="grid grid-2 gap-md">
                    <div>
                        <div style="overflow-y: auto; background: #006994; height: 60px; border-radius: var(--radius-sm); margin-bottom: var(--space-sm);"></div>
                        <strong>Primary: #006994</strong>
                        <p class="text-muted">Deep Blue</p>
                    </div>
                    <div>
                        <div style="overflow-y: auto; background: #00A8CC; height: 60px; border-radius: var(--radius-sm); margin-bottom: var(--space-sm);"></div>
                        <strong>Secondary: #00A8CC</strong>
                        <p class="text-muted">Teal</p>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3 class="mb-md"><i class="ti ti-code"></i> Usage</h3>
                <pre><code>&lt;link rel="stylesheet" href="https://ui.mullmania.com/ocean/style.css"&gt;</code></pre>
                <button onclick="navigator.clipboard.writeText('https://ui.mullmania.com/ocean/style.css').then(() => alert('URL copied!'))" class="btn-primary mt-md">
                    <i class="ti ti-copy"></i> Copy URL
                </button>
            </div>
        </div>
    </div>
</div>
<style>
pre { background: var(--bg-tertiary); padding: var(--space-md); border-radius: var(--radius-sm); overflow-x: auto; border-left: 3px solid var(--color-primary); }
code { font-family: var(--font-mono); font-size: var(--text-sm); }
ul li i { color: var(--color-success); margin-right: var(--space-xs); }
</style>
