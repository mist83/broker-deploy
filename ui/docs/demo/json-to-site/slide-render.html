<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JSON to Site · Render</title>
<link rel="stylesheet" href="/walmart/style.css">
<style>
  body { margin: 0; background: #f4f6fb; color: #101820; font-family: var(--font-family, system-ui); }
  .stage { box-sizing: border-box; width: 100vw; height: 100vh; padding: 42px 46px; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 22px; }
  header { display: flex; align-items: end; justify-content: space-between; gap: 28px; }
  .eyebrow { color: #1a5fb4; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; font-size: 15px; }
  h1 { margin: 4px 0 0; font-size: 44px; line-height: 1.04; letter-spacing: 0; }
  .url { border: 1px solid #c8d2e2; border-radius: 8px; background: white; padding: 13px 16px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 16px; color: #253143; max-width: 700px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panes { min-height: 0; display: grid; grid-template-columns: .9fr 1.1fr; gap: 20px; }
  .pane { min-width: 0; border: 1px solid #c8d2e2; border-radius: 8px; background: white; overflow: hidden; box-shadow: 0 14px 36px rgba(10, 32, 70, .13); }
  .pane-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #dbe3ef; font-weight: 850; background: #fbfcff; }
  pre { margin: 0; height: calc(100% - 45px); overflow: hidden; padding: 16px; background: #08111f; color: #d8e6ff; font-size: 14px; line-height: 1.33; white-space: pre-wrap; }
  iframe { width: 100%; height: calc(100% - 45px); border: 0; background: #f3f4f6; }
</style>
</head>
<body>
<main class="stage">
  <header>
    <div>
      <div class="eyebrow">Step 2</div>
      <h1>Point the renderer at the JSON.</h1>
    </div>
    <div class="url">/render.html?source=./docs/demo/json-to-site/contract.json</div>
  </header>
  <section class="panes">
    <div class="pane">
      <div class="pane-head"><span>JSON</span><span>source</span></div>
      <pre id="code">Loading contract...</pre>
    </div>
    <div class="pane">
      <div class="pane-head"><span>Rendered page</span><span>framework output</span></div>
      <iframe src="/render.html?source=/docs/demo/json-to-site/contract.json"></iframe>
    </div>
  </section>
</main>
<script>
fetch('./contract.json').then((res) => res.json()).then((contract) => {
  document.getElementById('code').textContent = JSON.stringify(contract, null, 2);
});
</script>
</body>
</html>
