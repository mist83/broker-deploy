<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JSON to Site · Contract</title>
<link rel="stylesheet" href="/walmart/style.css">
<style>
  body { margin: 0; background: #f4f6fb; color: #101820; font-family: var(--font-family, system-ui); }
  .stage { box-sizing: border-box; width: 100vw; height: 100vh; padding: 56px 64px; display: grid; grid-template-columns: 0.82fr 1.18fr; gap: 44px; align-items: stretch; }
  .copy { display: flex; flex-direction: column; justify-content: center; gap: 22px; }
  .eyebrow { color: #1a5fb4; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; font-size: 17px; }
  h1 { margin: 0; font-size: 66px; line-height: 1.02; letter-spacing: 0; }
  p { margin: 0; color: #3d4a5c; font-size: 25px; line-height: 1.38; max-width: 660px; }
  .pill-row { display: flex; gap: 12px; flex-wrap: wrap; padding-top: 8px; }
  .pill { border: 1px solid #c8d2e2; background: white; padding: 10px 14px; border-radius: 8px; font-weight: 750; font-size: 18px; }
  .code-wrap { min-width: 0; border: 1px solid #c8d2e2; border-radius: 8px; background: #08111f; overflow: hidden; box-shadow: 0 18px 40px rgba(10, 32, 70, .18); }
  .code-head { display: flex; align-items: center; justify-content: space-between; background: #111d2f; color: #dbe7ff; padding: 16px 20px; font-size: 18px; font-weight: 800; }
  pre { margin: 0; padding: 22px; height: calc(100% - 58px); overflow: hidden; color: #d8e6ff; font-size: 17px; line-height: 1.34; white-space: pre-wrap; }
</style>
</head>
<body>
<main class="stage">
  <section class="copy">
    <div class="eyebrow">Step 1</div>
    <h1>Write a tiny JSON contract.</h1>
    <p>The page is described as data: title, sections, stats, alerts, cards, and tables. The framework handles the actual UI.</p>
    <div class="pill-row">
      <span class="pill">No page HTML</span>
      <span class="pill">No CSS fork</span>
      <span class="pill">Theme included</span>
    </div>
  </section>
  <section class="code-wrap">
    <div class="code-head"><span>docs/demo/json-to-site/contract.json</span><span>raw input</span></div>
    <pre id="code">Loading contract...</pre>
  </section>
</main>
<script>
fetch('./contract.json').then((res) => res.json()).then((contract) => {
  document.getElementById('code').textContent = JSON.stringify(contract, null, 2);
});
</script>
</body>
</html>
