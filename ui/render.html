<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Renderer</title>
    <link rel="stylesheet" href="/core/detail-shell.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f3f4f6;
            color: #111827;
        }

        #app {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="/ui.js"></script>
    <script>
        window.UI.ready().then(() => window.UI.contract.renderFromLocation('#app'));
    </script>
</body>
</html>
