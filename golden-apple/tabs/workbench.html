<div class="golden-workbench" data-mode="video">
  <section class="card">
    <div class="grid-row" style="gap: var(--space-xs); margin-bottom: var(--space-md);">
      <button class="btn-tab is-active" type="button" data-mode-tab="video">Video</button>
      <button class="btn-tab" type="button" data-mode-tab="image">Image</button>
    </div>

    <div class="source-panel" data-only-mode="video">
      <div class="field-group">
        <label class="field-label" for="f-video">Source video</label>
        <input id="f-video" class="field-input" type="url" placeholder="https://example.com/path/to/clip.mp4">
      </div>
      <div class="field-group">
        <label class="field-label" for="f-srt">Subtitles (.srt)</label>
        <input id="f-srt" class="field-input" type="text" placeholder="optional caption source">
      </div>
      <button id="btn-example" class="btn-secondary" type="button">Load example</button>
    </div>

    <div class="source-panel" data-only-mode="image">
      <div class="field-group">
        <label class="field-label" for="f-image-file">Source image</label>
        <input id="f-image-file" class="field-input" type="file" accept="image/*">
      </div>
      <div class="field-group">
        <label class="field-label" for="f-image-url">…or paste an image URL</label>
        <input id="f-image-url" class="field-input" type="url" placeholder="https://example.com/photo.jpg">
      </div>
      <button id="btn-image-example" class="btn-secondary" type="button">Load example</button>
    </div>
  </section>

  <div class="workspace-grid">
    <aside class="card">
      <h3 class="rail-heading">Style</h3>
      <div class="field-group" style="margin-bottom: var(--space-md);">
        <select id="f-style" class="field-input">
          <option value="print">print - louder comic-print</option>
          <option value="pixel">pixel - sepia palette grid</option>
          <option value="sketch">sketch - pencil + color wash</option>
          <option value="comic">comic - flat posterized</option>
        </select>
      </div>

      <h3 class="rail-heading">Style params</h3>
      <div class="slider-row"><label class="field-label">Colors <span class="slider-value">16</span></label><input id="s-colors" type="range" min="2" max="32" step="1" value="16"></div>
      <div class="slider-row"><label class="field-label">Edge strength <span class="slider-value">0.88</span></label><input id="s-edge" type="range" min="0" max="1" step="0.01" value="0.88"></div>
      <div class="slider-row"><label class="field-label">Saturation <span class="slider-value">1.75</span></label><input id="s-saturation" type="range" min="0" max="3" step="0.05" value="1.75"></div>
      <div class="slider-row"><label class="field-label">Halftone <span class="slider-value">0.42</span></label><input id="s-halftone" type="range" min="0" max="1" step="0.01" value="0.42"></div>
      <div class="slider-row"><label class="field-label">Crystal <span class="slider-value">0.38</span></label><input id="s-crystal" type="range" min="0" max="1" step="0.01" value="0.38"></div>

      <h3 class="rail-heading" data-only-mode="video">Output</h3>
      <div class="slider-row" data-only-mode="video"><label class="field-label">Max width <span class="slider-value">854</span></label><input id="s-max-width" type="range" min="320" max="1920" step="2" value="854"></div>
      <div class="slider-row" data-only-mode="video"><label class="field-label">Trim to <span class="slider-value">30</span> seconds</label><input id="s-duration" type="range" min="5" max="300" step="5" value="30"></div>
    </aside>

    <section class="card">
      <div class="grid-row" style="justify-content: space-between; align-items: baseline; margin-bottom: var(--space-sm);">
        <h2 id="preview-title" style="margin: 0;">Preview</h2>
        <span id="preview-note" class="text-muted" style="font-size: var(--text-sm);">pick a source to start</span>
      </div>

      <div id="preview" class="comic-page is-placeholder" aria-label="Comic page preview" data-only-mode="video">
        <div class="panel"><span>render output appears here</span></div>
      </div>

      <div id="image-preview" class="comic-image-preview" aria-label="Image preview" data-only-mode="image">
        <canvas id="image-canvas"></canvas>
        <div class="image-placeholder">drop a source image to start</div>
      </div>

      <div class="preview-actions" data-only-mode="video">
        <button id="btn-render" class="btn-primary" type="button">Render comic</button>
        <button id="btn-json" class="btn-secondary" type="button">View JSON</button>
      </div>

      <div class="preview-actions" data-only-mode="image">
        <button id="btn-download-png" class="btn-primary" type="button" disabled>Download PNG</button>
        <span id="image-stats" class="text-muted" style="font-size: var(--text-sm);"></span>
      </div>

      <div id="status" class="mt-md"></div>
      <pre id="json-view" hidden style="margin-top: var(--space-md);"></pre>
    </section>
  </div>
</div>
