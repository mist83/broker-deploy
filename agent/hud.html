<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lecter · HUD</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Glanceable view of Claude Code + Codex sessions that need attention." />
  <link rel="icon" href="favicon.ico" />
  <script src="/lecter-theme.js"></script>
  <link rel="stylesheet" href="/lecter-theme.css" />
  <link rel="stylesheet" href="/hud.css" />
</head>
<body>
  <main id="hud" class="hud" data-state="loading">
    <header class="hud-head">
      <span class="hud-brand">
        <span class="hud-title">Lecter</span>
      </span>
      <span class="hud-actions">
        <button class="hud-btn" id="btn-screen" type="button" aria-label="Show desk Mac screen preview" aria-pressed="false" title="Show desk Mac screen preview">
          <svg class="ti" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 5a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1z" />
            <path d="M7 20h10" />
            <path d="M9 16v4" />
            <path d="M15 16v4" />
          </svg>
        </button>
        <button class="hud-btn" id="btn-qr" type="button" aria-label="Show scan code for live HUD" aria-expanded="false" aria-pressed="false" title="Show scan code for live HUD">
          <svg class="ti" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
            <path d="M7 17l0 .01" />
            <path d="M14 4m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
            <path d="M7 7l0 .01" />
            <path d="M4 14m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
            <path d="M17 7l0 .01" />
            <path d="M14 14l3 0" />
            <path d="M20 14l0 .01" />
            <path d="M14 14l0 3" />
            <path d="M14 20l3 0" />
            <path d="M17 17l3 0" />
            <path d="M20 17l0 3" />
          </svg>
        </button>
        <button class="hud-btn" id="btn-close" type="button" aria-label="Hide this window" title="Hide this window (reopen from lecter menu bar)">
          <svg class="ti" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6l-12 12" />
            <path d="M6 6l12 12" />
          </svg>
        </button>
      </span>
    </header>

    <section class="share-panel" id="share-panel" hidden>
      <div class="share-head">
        <span>scan live HUD</span>
      </div>
      <div class="qr-code" id="qr-code" role="img" aria-label="QR code for the live HUD"></div>
      <a class="share-url" id="share-url" href="/hud.html" target="_blank" rel="noopener">open live HUD</a>
    </section>

    <section class="hud-empty" hidden>
      <div class="empty-mark" id="empty-mark">✓</div>
      <div class="empty-text" id="empty-text">all good</div>
      <div class="empty-counts" id="empty-counts">—</div>
    </section>

    <section class="hud-screen" hidden id="hud-screen">
      <img id="hud-screen-img" alt="Live desk Mac screen preview" hidden />
      <div class="hud-screen-overlay" id="hud-screen-overlay" hidden>
        <span class="screen-overlay-icons">
          <svg class="ti" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 5a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1z" />
            <path d="M7 20h10" />
            <path d="M9 16v4" />
            <path d="M15 16v4" />
          </svg>
          <svg class="ti" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.58 5.548c.24 -.11 .495 -.19 .764 -.238a5.507 5.507 0 0 1 6.156 4.69h.5a4 4 0 0 1 3.579 5.787" />
            <path d="M17 17h-10a4 4 0 0 1 -.982 -7.875" />
            <path d="M3 3l18 18" />
          </svg>
        </span>
        <span class="screen-overlay-text">remote stream disabled</span>
      </div>
      <div class="hud-screen-placeholder" id="hud-screen-placeholder">
        <div class="hud-screen-placeholder-title">Screen preview is hidden</div>
        <div class="hud-screen-placeholder-text">Open the preview to request a live desk Mac frame.</div>
      </div>
      <div class="hud-screen-caption" id="hud-screen-caption">screen preview hidden</div>
    </section>

    <section class="hud-keepawake" id="hud-keepawake">
      <button class="hud-switch" id="keep-awake-toggle" type="button" role="switch" aria-checked="false">
        <span class="switch-knob" aria-hidden="true"></span>
        <span class="switch-copy">
          <span class="switch-title">Keep Mac awake</span>
          <span class="switch-note" id="keep-awake-status">checking wake state</span>
        </span>
      </button>
    </section>

    <section class="hud-list" hidden>
      <div class="list-label" id="list-label">
        <span class="list-title">sessions</span>
        <span class="list-tools"><span class="hud-mode" id="hud-mode">…</span></span>
      </div>
      <ul id="needs-you-list"></ul>
      <button class="row-collapse" id="row-collapse-toggle" type="button" hidden aria-expanded="false"></button>
    </section>

    <footer class="hud-foot">
      <span id="foot-stamp">—</span>
      <span class="foot-sep">·</span>
      <span id="foot-thresholds">—</span>
      <span class="foot-sep">·</span>
      <span id="foot-age" title="how recently the desk Mac published this snapshot">—</span>
    </footer>
  </main>

  <script type="module" src="/hud.js"></script>
</body>
</html>
