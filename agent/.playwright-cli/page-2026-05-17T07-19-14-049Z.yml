          - heading "Make FAB - Floating Action Button Wrapper Generator" [level=1] [ref=e128]
          - heading "TRIGGER" [level=2] [ref=e129]
          - paragraph [ref=e130]: When the user says "make a fab", "make this into a fab", "turn this into a fab", "create a fab", "wrap this in a fab", or similar phrases, activate this command to wrap HTML content in a FAB Collection library.
          - heading "PHILOSOPHY" [level=2] [ref=e131]
          - paragraph [ref=e132]: The FAB Collection pattern allows multiple floating action buttons (FABs) to coexist on a page, coordinating their sidebar panels. Each FAB library is self-contained - one script tag loads everything. The FAB Manager code is embedded (with DRIFT WARNING) in each library to avoid external dependencies.
          - paragraph [ref=e133]: "This command automates the pattern: take any HTML content, wrap it in FAB infrastructure, generate deployment-ready files, and upload to S3."
          - heading "WHAT IS A FAB?" [level=2] [ref=e134]
          - paragraph [ref=e135]: A FAB (Floating Action Button) is a circular button that appears in the bottom-right of the page. When clicked, it opens a sidebar panel from the right side. The FAB Collection system allows multiple FABs to coexist - when one sidebar opens, all FAB buttons hide. When the sidebar closes, all FABs reappear.
          - paragraph [ref=e136]:
            - strong [ref=e137]: "Key Pattern:"
            - text: Each FAB library embeds the FAB Manager code. The first library creates
            - code [ref=e138]: window.FABCollection
            - text: ", subsequent libraries reuse it. This is intentional to avoid external script dependencies."
