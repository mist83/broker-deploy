          - code [ref=e265]: "<!DOCTYPE html> <html lang=\"en\"> <head> <meta charset=\"UTF-8\"> <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"> <title>Test - {FAB Name}</title> <link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css\"> <style> body { margin: 0; padding: 40px; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; background: #f5f5f5; } .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); } h1 { margin: 0 0 20px 0; color: #333; } .status { padding: 12px; background: #e3f2fd; border-left: 4px solid #2196F3; margin-bottom: 20px; } code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-family: monospace; } </style> </head> <body> <div class=\"container\"> <h1>{FAB Name} - Test Page</h1> <div class=\"status\"> <strong>Status:</strong> FAB should appear in bottom-right corner </div> <h2>Instructions</h2> <ol> <li>Look for the FAB button (circular, {color}) in the bottom-right corner</li> <li>Click the FAB to open the sidebar panel</li> <li>Verify your content loads in the sidebar</li> <li>Close the sidebar with the × button</li> <li>Verify the FAB reappears</li> </ol> <h2>Integration</h2> <p>To use this FAB in your own page, add these lines:</p> <pre><code>&lt;link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css\"&gt; &lt;script src=\"https://vizio-data-ingestion-resources.s3.us-west-2.amazonaws.com/other/fabs/{fab-name}.js\"&gt;&lt;/script&gt;</code></pre> <h2>Publish Steps</h2> <ol> <li>Upload files to S3: <code>aws s3 cp {fab-name}.js s3://vizio-data-ingestion-resources/other/fabs/ --content-type \"application/javascript\"</code></li> <li>If separate HTML: <code>aws s3 cp {fab-name}.html s3://vizio-data-ingestion-resources/other/fabs/ --content-type \"text/html\"</code></li> <li>Make files public: <code>aws s3 cp s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.js s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.js --acl public-read</code></li> </ol> </div> <!-- Load FAB from local file for testing --> <script src=\"./{fab-name}.js\"></script> </body> </html>"
