          - heading "Color Validation" [level=3] [ref=e203]
          - code [ref=e205]: "function normalizeColor(input) { const colorMap = { 'blue': '#2196F3', 'green': '#4CAF50', 'red': '#f44336', 'orange': '#FF5722', 'purple': '#9C27B0', 'teal': '#009688', 'pink': '#E91E63', 'yellow': '#FFC107' }; if (input.startsWith('#') && /^#[0-9A-Fa-f]{6}$/.test(input)) { return input.toUpperCase(); } return colorMap[input.toLowerCase()] || '#2196F3'; }"
          - heading "FILE GENERATION" [level=2] [ref=e206]
          - heading "1. JavaScript Wrapper File" [level=3] [ref=e207]
