          - paragraph [ref=e328]: "Provide these exact commands:"
          - code [ref=e330]: "# Upload JavaScript library aws s3 cp {fab-name}.js s3://vizio-data-ingestion-resources/other/fabs/ --content-type \"application/javascript\" # Make JavaScript public aws s3 cp s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.js s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.js --acl public-read # Upload HTML (if separate file) aws s3 cp {fab-name}.html s3://vizio-data-ingestion-resources/other/fabs/ --content-type \"text/html\" # Make HTML public aws s3 cp s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.html s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.html --acl public-read"
          - heading "COMPLETION MESSAGE" [level=2] [ref=e331]
          - paragraph [ref=e332]: "After all files generated, provide this message:"
          - code [ref=e334]: "FAB library created! ✅ **Files Created:** - {fab-name}.js - Main FAB library (with embedded FAB Manager) - {fab-name}.html - Content file (if applicable) - test-{fab-name}.html - Local test page **Configuration:** - Name: {fab-name} - Icon: ti ti-{icon} - Color: {color} - Tooltip: {tooltip} **Test Locally:** 1. Open test-{fab-name}.html in your browser 2. Verify FAB appears in bottom-right corner 3. Click FAB to open sidebar 4. Test content loads correctly **Deploy to S3:** Upload JavaScript: aws s3 cp {fab-name}.js s3://vizio-data-ingestion-resources/other/fabs/ --content-type \"application/javascript\" aws s3 cp s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.js s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.js --acl public-read {if-html-file} Upload HTML: aws s3 cp {fab-name}.html s3://vizio-data-ingestion-resources/other/fabs/ --content-type \"text/html\" aws s3 cp s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.html s3://vizio-data-ingestion-resources/other/fabs/{fab-name}.html --acl public-read {endif} **Integration Example:** Add to any HTML page: <link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css\"> <script src=\"https://vizio-data-ingestion-resources.s3.us-west-2.amazonaws.com/other/fabs/{fab-name}.js\"></script> **FAB Collection:** This FAB integrates with the FAB Collection system. Multiple FABs can coexist on the same page. When one opens its sidebar, all FABs hide. When the sidebar closes, all FABs reappear. **Publish Steps:** 1. Test locally with test-{fab-name}.html 2. Upload to S3 using commands above 3. Integrate into your web page 4. Test with other FABs to verify coordination"
