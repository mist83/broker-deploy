          - heading "FAB Name Validation" [level=3] [ref=e197]
          - code [ref=e199]: "function isValidFABName(name) { return /^[a-z0-9]+(-[a-z0-9]+)*$/.test(name) && !name.startsWith('-') && !name.endsWith('-'); }"
