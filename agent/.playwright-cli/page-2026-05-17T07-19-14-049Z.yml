          - heading "REMEMBER" [level=2] [ref=e419]
          - paragraph [ref=e420]: This automation follows the proven pattern from mock-api-simple.js and html-canvas-overlay.js. The FAB Manager embedding is intentional to keep libraries self-contained. The DRIFT WARNING acknowledges this technical debt but makes the trade-off for simplicity.
          - paragraph [ref=e421]: Every FAB created with this command should work immediately when the JS file is loaded via script tag. No additional configuration or dependencies required (except Tabler icons CSS).
          - separator [ref=e422]
          - heading "FAB STANDARDS (Validated 2026-01-10)" [level=1] [ref=e423]
          - paragraph [ref=e424]: The following standards have been validated with real implementations and should be followed for all NEW FABs. Existing FABs (mock-api, bug-beacon, pointy-clicky) are legacy reference implementations and should not be modified unless there's a functional reason.
          - heading "SEMANTIC COLOR SYSTEM" [level=2] [ref=e425]
          - paragraph [ref=e426]: Use semantic color roles instead of arbitrary colors. This provides consistency and makes intent clear.
          - code [ref=e428]: "const COLORS = { // Semantic roles primary: '#2196F3', // Primary actions (blue) success: '#4CAF50', // Success states (green) warning: '#FF9800', // Warnings (orange) danger: '#f44336', // Errors/destructive actions (red) info: '#00BCD4', // Informational (cyan) // Panel theming (dark theme) bgPanel: '#2a2a2a', // Panel background bgCard: '#1a1a1a', // Card/section background bgButton: '#3a3a3a', // Button background borderColor: '#3a3a3a', // Border color borderLight: '#4a4a4a', // Lighter border // Text colors textPrimary: '#e0e0e0', // Primary text textSecondary: '#b0b0b0', // Secondary text textMuted: '#999999', // Muted text textOnAccent: '#ffffff' // Text on colored backgrounds };"
          - paragraph [ref=e429]:
            - strong [ref=e430]: "When to use each color:"
          - list [ref=e431]:
            - listitem [ref=e432]:
              - code [ref=e433]: primary
              - text: "- Main action buttons, primary FAB color for general tools"
            - listitem [ref=e434]:
              - code [ref=e435]: success
              - text: "- Confirmation actions, success states, \"save\" buttons"
            - listitem [ref=e436]:
              - code [ref=e437]: warning
              - text: "- Caution states, non-critical alerts"
            - listitem [ref=e438]:
              - code [ref=e439]: danger
              - text: "- Delete actions, error states, destructive operations"
            - listitem [ref=e440]:
              - code [ref=e441]: info
              - text: "- Informational FABs, help content, neutral notifications"
          - paragraph [ref=e442]:
            - strong [ref=e443]: "FAB Color Selection Guide:"
          - list [ref=e444]:
            - listitem [ref=e445]:
              - text: Data/API tools →
              - code [ref=e446]: primary
              - text: (blue)
            - listitem [ref=e447]:
              - text: Error monitoring →
              - code [ref=e448]: danger
              - text: (red)
            - listitem [ref=e449]:
              - text: UI tools →
              - code [ref=e450]: warning
              - text: (orange)
            - listitem [ref=e451]:
              - text: Testing/dev tools →
              - code [ref=e452]: info
              - text: (cyan)
            - listitem [ref=e453]:
              - text: Success indicators →
              - code [ref=e454]: success
              - text: (green)
