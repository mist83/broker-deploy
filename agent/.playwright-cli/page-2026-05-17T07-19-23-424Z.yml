        - generic [ref=e88]:
          - heading "Cline Playbooks (HMM - Help Me Make)" [level=1] [ref=e89]
          - paragraph [ref=e90]: Thinking through creative solutions with executable commands.
          - paragraph [ref=e91]:
            - strong [ref=e92]: "HMM Philosophy:"
            - text: Bridge the gap between thinking and making. These playbooks help you articulate ideas, scaffold projects, polish code, and orchestrate workflows - all through simple trigger phrases that unlock powerful automation.
          - separator [ref=e93]
          - heading "Always-Active Standards" [level=2] [ref=e94]
          - heading "Proactive Code Quality" [level=3] [ref=e95]
          - paragraph [ref=e96]:
            - strong [ref=e97]: "File:"
            - code [ref=e98]: proactive-code-quality.clinerules
            - strong [ref=e99]: "Activation:"
            - text: ALWAYS ACTIVE - automatically consulted when writing any code
          - paragraph [ref=e100]:
            - strong [ref=e101]: "What it does:"
            - text: Consolidated quality standards that guide all code generation without requiring explicit commands.
          - paragraph [ref=e102]:
            - strong [ref=e103]: "Includes:"
          - list [ref=e104]:
            - listitem [ref=e105]:
              - strong [ref=e106]: HTML/CSS/JS Standards
              - text: "- Semantic HTML5, flat design (no gradients), minimal nesting, vanilla JS preference"
            - listitem [ref=e107]:
              - strong [ref=e108]: Code Formatting
              - text: "- No emojis in code files, concise technical comments, Tabler icons for HTML"
            - listitem [ref=e109]:
              - strong [ref=e110]: Legacy Code Philosophy
              - text: "- Rewrite > patch, question assumptions, optimize for clarity"
            - listitem [ref=e111]:
              - strong [ref=e112]: PowerShell Syntax
              - text: "- Always use"
              - code [ref=e113]: ;
              - text: for chaining, never
              - code [ref=e114]: "&&"
              - text: or
              - code [ref=e115]: "||"
              - text: (CRITICAL - breaks 100% on Windows)
            - listitem [ref=e116]:
              - strong [ref=e117]: Architecture
              - text: "- Simplification over complexity, pragmatism over dogma, blast radius awareness"
          - paragraph [ref=e118]:
            - strong [ref=e119]: "When it applies:"
            - text: Automatically during any code generation, regardless of language or task. No trigger phrase needed.
          - paragraph [ref=e120]:
            - strong [ref=e121]: "Note:"
            - text: This is NOT a command you invoke - it's a quality standard that's always in effect.
          - separator [ref=e122]
          - heading "Playbook Categories" [level=2] [ref=e123]
          - heading "Generators" [level=3] [ref=e124]
          - paragraph [ref=e125]: Create new things from scratch.
          - heading "Integrations" [level=3] [ref=e126]
          - paragraph [ref=e127]: Add capabilities to existing projects.
          - heading "Quality" [level=3] [ref=e128]
          - paragraph [ref=e129]: Polish and refine existing code.
          - heading "Processes" [level=3] [ref=e130]
          - paragraph [ref=e131]: Workflows and meta-tasks.
          - separator [ref=e132]
          - heading "Generators" [level=2] [ref=e133]
          - paragraph [ref=e134]: These playbooks create new projects or components from scratch.
          - heading "1. Make Lambda" [level=3] [ref=e135]
          - paragraph [ref=e136]:
            - strong [ref=e137]: "Trigger:"
            - text: "\"make this into a lambda\" | \"make lambda\" | \"convert to lambda\""
            - strong [ref=e138]: "What it does:"
            - text: Converts a C# project into a deployable AWS Lambda using the proven template pattern. Automatically creates deployment configs, scripts, and updates project files with correct Lambda packages.
          - heading "2. Make FAB" [level=3] [ref=e139]
          - paragraph [ref=e140]:
            - strong [ref=e141]: "Trigger:"
            - text: "\"make a fab\" | \"make this into a fab\" | \"turn this into a fab\""
            - strong [ref=e142]: "What it does:"
            - text: Automates the FAB (Floating Action Button) wrapper pattern. Takes HTML content and wraps it with FAB Collection infrastructure - self-contained library that deploys to S3. Each FAB is a circular button in the bottom-right that opens a sidebar panel.
          - heading "3. Make TV App" [level=3] [ref=e143]
          - paragraph [ref=e144]:
            - strong [ref=e145]: "Trigger:"
            - text: "\"make a tv app\" | \"convert to tv\" | \"make this tv-friendly\""
            - strong [ref=e146]: "What it does:"
            - text: Creates fullscreen, keyboard-driven TV interface (10-foot viewing). Large text, minimal UI, high contrast. Optimized for couch interaction with remote control support.
          - separator [ref=e147]
          - heading "Integrations" [level=2] [ref=e148]
          - paragraph [ref=e149]: These playbooks add capabilities to existing projects.
          - heading "1. Add AI Assistance" [level=3] [ref=e150]
          - paragraph [ref=e151]:
            - strong [ref=e152]: "Trigger:"
            - text: "\"add AI assistance\" | \"add ai assistance\""
            - strong [ref=e153]: "What it does:"
            - text: Detects JavaScript or C# projects and creates complete AI helper code for interacting with the AI endpoint. Includes all 5 endpoints (test, ask, create, transform, convert) with hardcoded URL and simple error handling.
          - heading "2. Use Liskov File System" [level=3] [ref=e154]
          - paragraph [ref=e155]:
            - strong [ref=e156]: "Trigger:"
            - text: "\"use liskov file system\" | \"use liskov with [bucket-name] bucket\""
            - strong [ref=e157]: "What it does:"
            - text: Integrates the Liskov File System library - unified interface for local storage and AWS S3. Switch between storage providers without changing code.
          - heading "3. Add SignalArgh" [level=3] [ref=e158]
          - paragraph [ref=e159]:
            - strong [ref=e160]: "Trigger:"
            - text: "\"add signalargh\" | \"use signalargh\" | \"add signalr\""
            - strong [ref=e161]: "What it does:"
            - text: Integrates SignalArgh real-time messaging - free, no-registration SignalR hub. Creates complete client code for JavaScript, Python, or C# with channels, groups, and automatic reconnection.
          - separator [ref=e162]
          - heading "Quality" [level=2] [ref=e163]
          - paragraph [ref=e164]: These playbooks polish and refine existing code.
          - heading "1. KISS HTML/CSS/JS" [level=3] [ref=e165]
          - paragraph [ref=e166]:
            - strong [ref=e167]: "Trigger:"
            - text: "\"KISS the html\" | \"KISS the css\" | \"KISS the js\" | \"keep it simple html\""
            - strong [ref=e168]: "What it does:"
            - text: Enforces minimalist, semantic web design principles. Removes CSS gradients, unnecessary animations, and "AI stink" patterns. Replaces bloated markup with clean, semantic HTML5, flat colors, and simple styling. Anti-bloat web development.
          - paragraph [ref=e169]:
            - strong [ref=e170]: "Note:"
            - text: Many KISS principles are now part of the proactive code quality standards and apply automatically. Use this command when you need to explicitly audit and clean existing code.
          - heading "2. Destank" [level=3] [ref=e171]
          - paragraph [ref=e172]:
            - strong [ref=e173]: "Trigger:"
            - text: "\"destank\" | \"destink\" | \"unslop\" | \"remove ai stink\""
            - strong [ref=e174]: "What it does:"
            - text: Removes telltale AI-generated code patterns that make code obviously non-human. Strips verbose comments, sales pitch language, legacy indicators, excessive error handling, and redundant abstractions while maintaining functionality.
          - heading "3. Refresh Me" [level=3] [ref=e175]
          - paragraph [ref=e176]:
            - strong [ref=e177]: "Trigger:"
            - text: "\"refresh me\" | \"I have selective amnesia\" | \"tell me about this\" | \"get me tf back up to speed\""
            - strong [ref=e178]: "What it does:"
            - text: Provides a brief, high-level synopsis of the project for engineers. Highlights clever implementations and key architecture while skipping obvious patterns and boilerplate. Manager-level brief that showcases exceptional work.
          - paragraph [ref=e179]:
            - strong [ref=e180]: "Format:"
          - list [ref=e181]:
            - listitem [ref=e182]: One-sentence project purpose
            - listitem [ref=e183]: Key architectural decisions (interesting only)
            - listitem [ref=e184]: Clever bits (exceptional implementations highlighted)
            - listitem [ref=e185]: Tech stack (bullets)
            - listitem [ref=e186]: Deployment model
            - listitem [ref=e187]: Follow-up items
          - paragraph [ref=e188]:
            - strong [ref=e189]: "Note:"
            - text: Designed for capable engineers who can read code - focuses on what makes the implementation special, not standard patterns.
          - separator [ref=e190]
          - heading "Processes" [level=2] [ref=e191]
          - paragraph [ref=e192]: These playbooks handle workflows and meta-tasks.
          - heading "1. Capisce Protocol" [level=3] [ref=e193]
          - paragraph [ref=e194]:
            - strong [ref=e195]: "Trigger:"
            - text: "\"capisce?\" (at end of message)"
            - strong [ref=e196]: "What it does:"
            - text: Makes Cline read back your request in its own words and wait for button confirmation before proceeding. Prevents misunderstandings and wasted effort. Uses gatekeep mechanism - always requires button confirmation.
          - heading "2. Guided Design Wizard (HTML Questionnaire)" [level=3] [ref=e197]
          - paragraph [ref=e198]:
            - strong [ref=e199]: "Trigger:"
            - text: "\"design wizard\" | \"app wizard\" | \"click-through design\" | \"turn this into an app\" | \"guide me with html questionnaire\""
            - strong [ref=e200]: "What it does:"
            - text: Transforms vague ideas into concrete app specifications through an HTML questionnaire. Generates a throwaway HTML file with all questions that you answer in your browser, then copy the synopsis back to Cline. Parallelism - answer everything at once instead of back-and-forth chat.
          - paragraph [ref=e201]:
            - strong [ref=e202]: "How it works:"
          - list [ref=e203]:
            - listitem [ref=e204]: Analyzes your request (e.g., "I want to build a task management app")
            - listitem [ref=e205]: Generates HTML questionnaire with 5-10 relevant questions
            - listitem [ref=e206]: Opens questionnaire in your browser
            - listitem [ref=e207]: You answer all questions at once (multiple choice + "Other" text fields)
            - listitem [ref=e208]: Live synopsis updates as you select answers
            - listitem [ref=e209]: Click "Copy to Clipboard"
            - listitem [ref=e210]: Paste synopsis back to Cline
            - listitem [ref=e211]: Cline creates implementation plan and proceeds
          - paragraph [ref=e212]:
            - strong [ref=e213]: "Design:"
          - list [ref=e214]:
            - listitem [ref=e215]: Minimal/flat (KISS principles)
            - listitem [ref=e216]: Clean white background, simple form controls
            - listitem [ref=e217]: Functional only, no bloat
            - listitem [ref=e218]: Throwaway HTML (one-time use)
          - paragraph [ref=e219]:
            - strong [ref=e220]: "For tiered questions:"
            - text: If answers unlock follow-up questions, Cline generates questionnaire-2.html after reviewing your first answers.
          - paragraph [ref=e221]:
            - strong [ref=e222]: "Philosophy:"
            - text: Parallelism over back-and-forth. Answer everything in one browser session instead of typing responses in chat. Human still in the middle, but the process is streamlined.
          - paragraph [ref=e223]:
            - strong [ref=e224]: "Note:"
            - text: Separate from /deep-planning. Designed for "vibe development" where you want to answer design questions all at once without extensive typing.
          - heading "3. Fix Bugs" [level=3] [ref=e225]
          - paragraph [ref=e226]:
            - strong [ref=e227]: "Trigger:"
            - text: "\"fix bugs\" | \"resolve bugs\" | \"address bugs\""
            - strong [ref=e228]: "What it does:"
            - text: Fetches reported bugs from Bug Beacon tracker, allows user to select which to fix, then creates DallAIre tasks with full bug context. Closes the feedback loop by automatically deleting bugs from tracker once tasks are created.
          - heading "4. Fix Nitpicks" [level=3] [ref=e229]
          - paragraph [ref=e230]:
            - strong [ref=e231]: "Trigger:"
            - text: "\"fix nitpicks\" | \"fix nits\" | \"obliterate nits\""
            - strong [ref=e232]: "What it does:"
            - text: Fetches UI nitpicks from Nit Picker tracker, allows user to select which to fix, then creates DallAIre tasks with full context (selectors, element info, user notes). Automatically deletes nitpicks from tracker once tasks are created.
          - separator [ref=e233]
          - heading "Understanding Playbook Types" [level=2] [ref=e234]
          - heading "Proactive Playbooks (Always Active)" [level=3] [ref=e235]
          - list [ref=e236]:
            - listitem [ref=e237]: Apply automatically during code generation
            - listitem [ref=e238]: No trigger phrase needed
            - listitem [ref=e239]: "Example: Code formatting, PowerShell syntax, semantic HTML preferences"
          - heading "Command Playbooks (User-Triggered)" [level=3] [ref=e240]
          - list [ref=e241]:
            - listitem [ref=e242]: Only activate when you use specific trigger phrases
            - listitem [ref=e243]: Useful for specific tasks or integrations
            - listitem [ref=e244]: "Example: \"make lambda\", \"add AI assistance\", \"KISS the html\""
