        - generic [ref=e128]:
          - heading "Refresh Me - Project Synopsis Command" [level=1] [ref=e129]
          - heading "TRIGGER" [level=2] [ref=e130]
          - paragraph [ref=e131]: "When the user says any of:"
          - list [ref=e132]:
            - listitem [ref=e133]: "\"refresh me\""
            - listitem [ref=e134]: "\"I have selective amnesia\""
            - listitem [ref=e135]: "\"tell me about this\""
            - listitem [ref=e136]: "\"get me tf back up to speed\""
            - listitem [ref=e137]: "\"what did we build\""
            - listitem [ref=e138]: "\"give me the manager brief\""
            - listitem [ref=e139]: Or similar phrases requesting a high-level overview
          - heading "COMMAND PREFIX" [level=2] [ref=e140]
          - paragraph [ref=e141]: "Can be forced with:"
          - list [ref=e142]:
            - listitem [ref=e143]:
              - code [ref=e144]: "directive: refresh me"
            - listitem [ref=e145]:
              - code [ref=e146]: "force: refresh me"
          - heading "PHILOSOPHY" [level=2] [ref=e147]
          - paragraph [ref=e148]: "You're briefing a capable software engineer who can read code. They want:"
          - list [ref=e149]:
            - listitem [ref=e150]:
              - strong [ref=e151]: High-level architecture
              - text: "- not implementation details"
            - listitem [ref=e152]:
              - strong [ref=e153]: Clever bits highlighted
              - text: "- where you did something exceptional"
            - listitem [ref=e154]:
              - strong [ref=e155]: Glue code ignored
              - text: "- standard CRUD, obvious patterns, boilerplate"
            - listitem [ref=e156]:
              - strong [ref=e157]: Brief and punchy
              - text: "- manager synopsis that tickles the dev/nerd parts"
          - heading "RULES" [level=2] [ref=e158]
          - heading "What to Include" [level=3] [ref=e159]
          - list [ref=e160]:
            - listitem [ref=e161]:
              - strong [ref=e162]: Project purpose
              - text: "- one sentence"
            - listitem [ref=e163]:
              - strong [ref=e164]: Key architectural decisions
              - text: "- only the interesting ones"
            - listitem [ref=e165]:
              - strong [ref=e166]: Clever implementations
              - text: "- highlight exceptional work"
            - listitem [ref=e167]:
              - strong [ref=e168]: Tech stack
              - text: "- bullet points only"
            - listitem [ref=e169]:
              - strong [ref=e170]: Deployment model
              - text: "- where/how it runs"
          - heading "What to Exclude" [level=3] [ref=e171]
          - list [ref=e172]:
            - listitem [ref=e173]: Standard CRUD operations
            - listitem [ref=e174]: Obvious REST API patterns
            - listitem [ref=e175]: Basic file structures
            - listitem [ref=e176]: Standard configuration
            - listitem [ref=e177]: Boilerplate code
          - heading "Language Guidelines" [level=3] [ref=e178]
          - list [ref=e179]:
            - listitem [ref=e180]: "\"Stored in cloud\" NOT \"stored in S3 via keys with async batch processing...\""
            - listitem [ref=e181]: "\"Easily retrieved\" NOT detailed query explanation"
            - listitem [ref=e182]: Only include code snippets for truly exceptional implementations
            - listitem [ref=e183]: Use terms like "clever", "interesting", "notable" to flag special work
            - listitem [ref=e184]: Skip phrases like "implements standard", "follows typical pattern"
          - heading "OUTPUT FORMAT" [level=2] [ref=e185]
          - code [ref=e187]: "# [Project Name] [One sentence purpose] ## Key Architecture - [Only interesting architectural choices] - [Skip obvious patterns] ## Clever Bits - [Highlight exceptional implementations] - [Call out smart solutions] ## Tech Stack - [Bulleted list] ## Deployment - [Where/how it runs] ## Follow-up - [What remains or how to use it]"
          - heading "EXAMPLE (Good)" [level=2] [ref=e188]
          - code [ref=e190]: "# Tixplain Analyzes GitHub PRs and JIRA tickets to build an AI-powered semantic knowledge base of problem-solution patterns. ## Key Architecture - **Idempotent repository caching** - checks existence before cloning, reuses across analyses - **Dual storage model** - SQLite for speed, auto-syncs to S3 for persistence - **Vector similarity search** - 1536-dim embeddings with cosine similarity for pattern recognition ## Clever Bits - **Repository manager** applies PR changes locally for real diff analysis (not just API metadata) - **Liskov File System abstraction** - transparent local/S3 switching without code changes - **Semantic tag extraction** - AI generates searchable taxonomy automatically ## Tech Stack - .NET 8 Lambda with Function URL - Bedrock Claude + Titan Embeddings - SQLite → S3 via Liskov - Octokit + git CLI ## Deployment Lambda with 2GB RAM, 5min timeout, Function URL enabled ## Follow-up Configure GitHub/JIRA tokens, deploy with `.\\scripts\\deploy_tixplain.ps1`"
          - heading "EXAMPLE (Bad - Too Verbose)" [level=2] [ref=e191]
          - code [ref=e193]: "# Tixplain This is a comprehensive ticket explanation and knowledge extraction system that has been designed to analyze GitHub pull requests and JIRA tickets using advanced AI capabilities. The system creates a searchable knowledge base... ## Architecture - Uses ASP.NET Core Web API with standard REST endpoints - Implements dependency injection for all services - Has three controllers following standard MVC pattern - Uses Entity Framework Core for database access - Stores data in SQLite database with standard schema - Implements standard CRUD operations... [Goes on for pages about obvious stuff]"
          - heading "IMPORTANT" [level=2] [ref=e194]
          - paragraph [ref=e195]: "This is for engineers who know how things work. They don't need:"
          - list [ref=e196]:
            - listitem [ref=e197]: Explanations of what REST APIs are
            - listitem [ref=e198]: Details on how dependency injection works
            - listitem [ref=e199]: Standard patterns spelled out
            - listitem [ref=e200]: Boilerplate acknowledged
          - paragraph [ref=e201]: "They DO need:"
          - list [ref=e202]:
            - listitem [ref=e203]: What makes THIS implementation special
            - listitem [ref=e204]: Smart decisions that aren't obvious
            - listitem [ref=e205]: Trade-offs and why you picked them
            - listitem [ref=e206]: How to actually use it
          - paragraph [ref=e207]: Keep it punchy. Keep it interesting. Skip the obvious.