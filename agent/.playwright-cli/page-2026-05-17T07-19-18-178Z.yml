        - generic [ref=e127]:
          - heading "Deep Planning & Architectural Triage" [level=1] [ref=e128]
          - paragraph [ref=e129]:
            - text: When the user requests
            - code [ref=e130]: /deep-planning
            - text: "or architectural triage, use this framework:"
          - paragraph [ref=e131]: Simplify this codebase architecturally without losing functionality. "It's simple enough for a human to understand, good job!" is a valid answer. Suss out any discrepancies between the functionality and the README before you do, though - I want to make sure I set the record straight on what this app is supposed to DO (and what it actually does - those should ideally be one and the same!)
          - paragraph [ref=e132]: "Ask yourself these kinds of questions:"
          - paragraph [ref=e133]: How would you better develop against this library?
          - paragraph [ref=e134]: Assume you are free to cast any practice into doubt, including those in your agent instruction files.
          - paragraph [ref=e135]: I want to limit blast radius for things LIKE changing a css variable or a simple Javascript function - but eventually everything that's vibe-coded comes tumbling down like that in my experience - this text (yes, THIS VERY TEXT I AM TYPING RIGHT NOW) is an attempt to guard against that. (PS - feel free to call THIS text into question as well!)
          - paragraph [ref=e136]: I want your opinion as an expert in getting shit done (GSD). You're smart, tell it straight even when it conflicts with your perception of my understanding of the subject, and not afraid to cut corners where the corners stank of dog...ma (dogma, instead of practicality).
          - paragraph [ref=e137]: Mirror me in your response/responses.
          - heading "Analysis Framework" [level=2] [ref=e138]
          - paragraph [ref=e139]: "When conducting this architectural triage, follow this systematic approach:"
          - heading "1. Reality vs Documentation Audit" [level=3] [ref=e140]
          - list [ref=e141]:
            - listitem [ref=e142]:
              - strong [ref=e143]: What does the code actually do?
              - text: "- Examine the core functionality"
            - listitem [ref=e144]:
              - strong [ref=e145]: What does the documentation claim?
              - text: "- Check README, comments, and stated goals"
            - listitem [ref=e146]:
              - strong [ref=e147]: Gap Analysis
              - text: "- Where are the biggest disconnects?"
            - listitem [ref=e148]:
              - strong [ref=e149]: Truth Alignment
              - text: "- Recommend either fixing code to match docs, or docs to match code"
          - heading "2. Architectural Complexity Assessment" [level=3] [ref=e150]
          - list [ref=e151]:
            - listitem [ref=e152]:
              - strong [ref=e153]: Core Functionality
              - text: "- What are the 3-5 essential features this actually provides?"
            - listitem [ref=e154]:
              - strong [ref=e155]: Unnecessary Abstractions
              - text: "- What layers add complexity without value?"
            - listitem [ref=e156]:
              - strong [ref=e157]: Coupling Analysis
              - text: "- What requires extensive changes for simple modifications?"
            - listitem [ref=e158]:
              - strong [ref=e159]: Blast Radius Evaluation
              - text: "- Which changes would cascade into other systems?"
          - heading "3. Practical Simplification" [level=3] [ref=e160]
          - list [ref=e161]:
            - listitem [ref=e162]:
              - strong [ref=e163]: Consolidation Opportunities
              - text: "- What can be merged or eliminated?"
            - listitem [ref=e164]:
              - strong [ref=e165]: Interface Clarity
              - text: "- How could developers interact with this more simply?"
            - listitem [ref=e166]:
              - strong [ref=e167]: Configuration Reduction
              - text: "- What options/settings are actually needed?"
            - listitem [ref=e168]:
              - strong [ref=e169]: Dependency Minimization
              - text: "- What external dependencies add unnecessary weight?"
          - heading "4. Development Experience (DX) Evaluation" [level=3] [ref=e170]
          - list [ref=e171]:
            - listitem [ref=e172]:
              - strong [ref=e173]: Local Development
              - text: "- How easy is it to run/test/develop against this?"
            - listitem [ref=e174]:
              - strong [ref=e175]: Debugging Experience
              - text: "- Can developers easily understand what's happening?"
            - listitem [ref=e176]:
              - strong [ref=e177]: Extensibility
              - text: "- How hard is it to add new features?"
            - listitem [ref=e178]:
              - strong [ref=e179]: Maintenance Burden
              - text: "- What will be painful to maintain long-term?"
          - heading "5. Dogma vs Pragmatism Check" [level=3] [ref=e180]
          - list [ref=e181]:
            - listitem [ref=e182]:
              - strong [ref=e183]: Best Practices Audit
              - text: "- Which \"best practices\" are actually hindering progress?"
            - listitem [ref=e184]:
              - strong [ref=e185]: Pattern Analysis
              - text: "- What patterns are used because \"that's how it's done\" vs solving real problems?"
            - listitem [ref=e186]:
              - strong [ref=e187]: Over-Engineering Detection
              - text: "- What's been built for hypothetical future needs?"
            - listitem [ref=e188]:
              - strong [ref=e189]: Practical Alternatives
              - text: "- What simpler approaches would achieve the same goals?"
          - heading "Expected Output" [level=2] [ref=e190]
          - paragraph [ref=e191]: "Provide a brutally honest assessment that includes:"
          - list [ref=e192]:
            - listitem [ref=e193]:
              - strong [ref=e194]: Executive Summary
              - text: "- What this thing actually does in 2-3 sentences"
            - listitem [ref=e195]:
              - strong [ref=e196]: Architecture Reality Check
              - text: "- Core components and their actual purpose"
            - listitem [ref=e197]:
              - strong [ref=e198]: Simplification Recommendations
              - text: "- Specific, actionable changes to reduce complexity"
            - listitem [ref=e199]:
              - strong [ref=e200]: Blast Radius Analysis
              - text: "- What changes would be high-impact vs low-risk"
            - listitem [ref=e201]:
              - strong [ref=e202]: Documentation Alignment
              - text: "- How to make docs and code match reality"
            - listitem [ref=e203]:
              - strong [ref=e204]: Follow-up Plan
              - text: "- Prioritized list of improvements that maximize simplicity gains"
          - paragraph [ref=e205]: "Remember: The goal is to make this codebase understandable by humans and maintainable without requiring a PhD in the original developer's thought process."