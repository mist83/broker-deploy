        - generic [ref=e127]:
          - heading "Refresh Me - Project Synopsis Command" [level=1] [ref=e128]
          - heading "TRIGGER" [level=2] [ref=e129]
          - paragraph [ref=e130]: "When the user says any of:"
          - list [ref=e131]:
            - listitem [ref=e132]: "\"refresh me\""
            - listitem [ref=e133]: "\"I have selective amnesia\""
            - listitem [ref=e134]: "\"tell me about this\""
            - listitem [ref=e135]: "\"get me tf back up to speed\""
            - listitem [ref=e136]: "\"what did we build\""
            - listitem [ref=e137]: "\"give me the manager brief\""
            - listitem [ref=e138]: Or similar phrases requesting a high-level overview
          - heading "COMMAND PREFIX" [level=2] [ref=e139]
          - paragraph [ref=e140]: "Can be forced with:"
          - list [ref=e141]:
            - listitem [ref=e142]:
              - code [ref=e143]: "directive: refresh me"
            - listitem [ref=e144]:
              - code [ref=e145]: "force: refresh me"
          - heading "PHILOSOPHY" [level=2] [ref=e146]
          - paragraph [ref=e147]: "You're briefing a capable software engineer who can read code. They want:"
          - list [ref=e148]:
            - listitem [ref=e149]:
              - strong [ref=e150]: High-level architecture
              - text: "- not implementation details"
            - listitem [ref=e151]:
              - strong [ref=e152]: Clever bits highlighted
              - text: "- where you did something exceptional"
            - listitem [ref=e153]:
              - strong [ref=e154]: Glue code ignored
              - text: "- standard CRUD, obvious patterns, boilerplate"
            - listitem [ref=e155]:
              - strong [ref=e156]: Brief and punchy
              - text: "- manager synopsis that tickles the dev/nerd parts"
          - heading "RULES" [level=2] [ref=e157]
          - heading "What to Include" [level=3] [ref=e158]
          - list [ref=e159]:
            - listitem [ref=e160]:
              - strong [ref=e161]: Project purpose
              - text: "- one sentence"
            - listitem [ref=e162]:
              - strong [ref=e163]: Key architectural decisions
              - text: "- only the interesting ones"
            - listitem [ref=e164]:
              - strong [ref=e165]: Clever implementations
              - text: "- highlight exceptional work"
            - listitem [ref=e166]:
              - strong [ref=e167]: Tech stack
              - text: "- bullet points only"
            - listitem [ref=e168]:
              - strong [ref=e169]: Deployment model
              - text: "- where/how it runs"
          - heading "What to Exclude" [level=3] [ref=e170]
          - list [ref=e171]:
            - listitem [ref=e172]: Standard CRUD operations
            - listitem [ref=e173]: Obvious REST API patterns
            - listitem [ref=e174]: Basic file structures
            - listitem [ref=e175]: Standard configuration
            - listitem [ref=e176]: Boilerplate code
          - heading "Language Guidelines" [level=3] [ref=e177]
          - list [ref=e178]:
            - listitem [ref=e179]: "\"Stored in cloud\" NOT \"stored in S3 via keys with async batch processing...\""
            - listitem [ref=e180]: "\"Easily retrieved\" NOT detailed query explanation"
            - listitem [ref=e181]: Only include code snippets for truly exceptional implementations
            - listitem [ref=e182]: Use terms like "clever", "interesting", "notable" to flag special work
            - listitem [ref=e183]: Skip phrases like "implements standard", "follows typical pattern"
          - heading "OUTPUT FORMAT" [level=2] [ref=e184]
          - code [ref=e186]: "# [Project Name] [One sentence purpose] ## Key Architecture - [Only interesting architectural choices] - [Skip obvious patterns] ## Clever Bits - [Highlight exceptional implementations] - [Call out smart solutions] ## Tech Stack - [Bulleted list] ## Deployment - [Where/how it runs] ## Follow-up - [What remains or how to use it]"
          - heading "EXAMPLE (Good)" [level=2] [ref=e187]
          - code [ref=e189]: "# Tixplain Analyzes GitHub PRs and JIRA tickets to build an AI-powered semantic knowledge base of problem-solution patterns. ## Key Architecture - **Idempotent repository caching** - checks existence before cloning, reuses across analyses - **Dual storage model** - SQLite for speed, auto-syncs to S3 for persistence - **Vector similarity search** - 1536-dim embeddings with cosine similarity for pattern recognition ## Clever Bits - **Repository manager** applies PR changes locally for real diff analysis (not just API metadata) - **Liskov File System abstraction** - transparent local/S3 switching without code changes - **Semantic tag extraction** - AI generates searchable taxonomy automatically ## Tech Stack - .NET 8 Lambda with Function URL - Bedrock Claude + Titan Embeddings - SQLite → S3 via Liskov - Octokit + git CLI ## Deployment Lambda with 2GB RAM, 5min timeout, Function URL enabled ## Follow-up Configure GitHub/JIRA tokens, deploy with `.\\scripts\\deploy_tixplain.ps1`"
          - heading "EXAMPLE (Bad - Too Verbose)" [level=2] [ref=e190]
          - code [ref=e192]: "# Tixplain This is a comprehensive ticket explanation and knowledge extraction system that has been designed to analyze GitHub pull requests and JIRA tickets using advanced AI capabilities. The system creates a searchable knowledge base... ## Architecture - Uses ASP.NET Core Web API with standard REST endpoints - Implements dependency injection for all services - Has three controllers following standard MVC pattern - Uses Entity Framework Core for database access - Stores data in SQLite database with standard schema - Implements standard CRUD operations... [Goes on for pages about obvious stuff]"
          - heading "IMPORTANT" [level=2] [ref=e193]
          - paragraph [ref=e194]: "This is for engineers who know how things work. They don't need:"
          - list [ref=e195]:
            - listitem [ref=e196]: Explanations of what REST APIs are
            - listitem [ref=e197]: Details on how dependency injection works
            - listitem [ref=e198]: Standard patterns spelled out
            - listitem [ref=e199]: Boilerplate acknowledged
          - paragraph [ref=e200]: "They DO need:"
          - list [ref=e201]:
            - listitem [ref=e202]: What makes THIS implementation special
            - listitem [ref=e203]: Smart decisions that aren't obvious
            - listitem [ref=e204]: Trade-offs and why you picked them
            - listitem [ref=e205]: How to actually use it
          - paragraph [ref=e206]: Keep it punchy. Keep it interesting. Skip the obvious.