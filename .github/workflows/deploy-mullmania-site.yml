name: Broker Deploy Mullmania Site

on:
  workflow_dispatch:
    inputs:
      site_id:
        description: Allowlisted site id to deploy.
        required: true
        type: string
      reason:
        description: Optional caller note.
        required: false
        type: string
      source:
        description: Optional caller label.
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: broker-deploy-${{ inputs.site_id }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout broker tooling
        uses: actions/checkout@v6
        with:
          path: broker-tooling

      - name: Download allowlisted target
        id: target
        env:
          SITE_ID: ${{ inputs.site_id }}
          BROKER_TARGET_API_URL: https://sites.mullmania.com/api/redeploy/broker-target
          BROKER_API_KEY: ${{ secrets.MULLMANIA_BROKER_API_KEY }}
          PRIVATE_REPO_TOKEN: ${{ secrets.MULLMANIA_PRIVATE_REPO_TOKEN }}
        shell: python
        run: |
          import io
          import json
          import os
          import shutil
          import tarfile
          import urllib.request
          from pathlib import Path

          site_id = os.environ["SITE_ID"].strip()
          broker_api_key = os.environ["BROKER_API_KEY"].strip()
          if not broker_api_key:
            raise SystemExit("MULLMANIA_BROKER_API_KEY is not configured.")

          lookup_request = urllib.request.Request(
            os.environ["BROKER_TARGET_API_URL"].strip(),
            data=json.dumps({"siteId": site_id}).encode("utf-8"),
            method="POST",
            headers={
              "Accept": "application/json",
              "Content-Type": "application/json",
              "User-Agent": "mullmania-broker-deploy",
              "X-Broker-Deploy-Key": broker_api_key,
            },
          )
          with urllib.request.urlopen(lookup_request, timeout=15) as response:
            lookup = json.loads(response.read().decode("utf-8"))

          target = lookup.get("target") if isinstance(lookup, dict) else None
          if not isinstance(target, dict):
            raise SystemExit(f"Unsupported site_id: {site_id}")

          repo = str(target["sourceRepo"]).strip()
          ref = str(target.get("sourceRef") or "main").strip()
          config = str(target.get("config") or "mullmania.site.json").strip()
          deploy_type = str(target.get("deployType") or "static-site").strip()
          if deploy_type not in ("static-site", "sites-control-plane"):
            raise SystemExit(f"Unsupported deployType: {deploy_type}")
          if deploy_type == "sites-control-plane" and (
            site_id != "sites"
            or repo.lower() != "mist83/sites"
            or ref != "main"
            or config != "mullmania.site.json"
          ):
            raise SystemExit("sites-control-plane is only allowed for mist83/sites main.")
          token = os.environ["PRIVATE_REPO_TOKEN"].strip()
          if not token:
            raise SystemExit("MULLMANIA_PRIVATE_REPO_TOKEN is not configured.")

          url = f"https://api.github.com/repos/{repo}/tarball/{ref}"
          request = urllib.request.Request(
            url,
            headers={
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "mullmania-broker-deploy",
              "X-GitHub-Api-Version": "2022-11-28",
            },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
            archive = response.read()

          target_dir = Path("target-site")
          shutil.rmtree(target_dir, ignore_errors=True)
          target_dir.mkdir()
          with tarfile.open(fileobj=io.BytesIO(archive), mode="r:gz") as tar:
            members = []
            for member in tar.getmembers():
              parts = Path(member.name).parts
              if len(parts) < 2:
                continue
              member.name = str(Path(*parts[1:]))
              members.append(member)
            tar.extractall(target_dir, members=members)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"config={config}\n")
            output.write(f"deploy_type={deploy_type}\n")

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: arn:aws:iam::166404899495:role/github-actions-role
          aws-region: us-west-2

      - name: Deploy Sites control-plane backend
        if: steps.target.outputs.deploy_type == 'sites-control-plane'
        working-directory: target-site
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL }}
          OPENAI_RESPONSES_MODEL: ${{ secrets.OPENAI_RESPONSES_MODEL || vars.OPENAI_RESPONSES_MODEL }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE || vars.OPENAI_API_BASE }}
          OPENAI_ORGANIZATION: ${{ secrets.OPENAI_ORGANIZATION || vars.OPENAI_ORGANIZATION }}
          OPENAI_PROJECT: ${{ secrets.OPENAI_PROJECT || vars.OPENAI_PROJECT }}
        run: |
          set -euo pipefail
          npm ci
          npm run deploy-api

      - name: Deploy target site
        working-directory: target-site
        shell: bash
        run: aws s3 cp s3://mullmania.com-data/_tools/deploy.sh - --region us-west-2 | bash -s -- apply --config "${{ steps.target.outputs.config }}"

      - name: Mirror public artifact to GitHub Pages branch
        env:
          SITE_ID: ${{ inputs.site_id }}
          GITHUB_TOKEN: ${{ github.token }}
          REDEPLOY_SOURCE: ${{ inputs.source }}
        shell: bash
        run: |
          set -euo pipefail

          rm -rf pages-source
          if ! git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" pages-source; then
            git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" pages-source
            cd pages-source
            git switch --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          rm -rf "pages-source/${SITE_ID}"
          mkdir -p "pages-source/${SITE_ID}"
          aws s3 sync "s3://mullmania.com/${SITE_ID}/" "pages-source/${SITE_ID}/" --delete --only-show-errors
          touch pages-source/.nojekyll

          page_base_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          node broker-tooling/scripts/render-transparency-index.mjs \
            --pages-dir pages-source \
            --site-id "${SITE_ID}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-number "${GITHUB_RUN_NUMBER}" \
            --run-url "${run_url}" \
            --broker-sha "${GITHUB_SHA}" \
            --trigger-source "${REDEPLOY_SOURCE}" \
            --page-base-url "${page_base_url}"

          cd pages-source
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "GitHub Pages mirror is already current."
          else
            git commit -m "Mirror ${SITE_ID} artifact"
            git push origin gh-pages
          fi
